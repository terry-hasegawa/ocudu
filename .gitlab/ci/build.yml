##########
# Weekly #
##########

check builders ubuntu versions:
  extends: .check image exists for all supported ubuntu versions
  stage: static
  rules:
    - if: $CI_PIPELINE_SCHEDULE_DESCRIPTION =~ /Weekly/
      when: delayed
      start_in: 15 minutes
  variables:
    VERSIONS_TO_IGNORE: "20.04"
  script:
    - check_if_image_exists ${CI_REGISTRY_IMAGE}/builder-ubuntu- :${DOCKER_BUILDER_VERSION}

# Sanitizers

.weekly sanitizers:
  extends: .build_and_unit
  rules:
    - if: $CI_PIPELINE_SCHEDULE_DESCRIPTION =~ /Weekly/
  variables:
    ASSERT_LEVEL: PARANOID
    CMAKE_BUILD_TYPE: Debug

sanitizers avx2:
  extends: .weekly sanitizers
  rules:
    - if: $CI_PIPELINE_SCHEDULE_DESCRIPTION =~ /Weekly/
      when: delayed
      start_in: 1 hour
  variables:
    MARCH: x86-64-v3
  parallel:
    matrix:
      # ubuntu-22.04 disabled due to https://github.com/google/sanitizers/issues/1259#issuecomment-642312392
      # TSAN Ubuntu 24.04 disabled - TSAN requires an ASLR config of 28 bits (instead of 32 bit as is by default on Ubuntu 24.04)
      - OS: [ubuntu-26.04]
        SANITIZER: tsan
        COMPILER: [gcc, clang]
        ENABLE_TSAN: "True"
        TEST_MODE: default
      - OS: [ubuntu-26.04, ubuntu-24.04]
        SANITIZER: asan
        COMPILER: clang
        ENABLE_ASAN: "True"
        TEST_MODE: default
      - OS: [ubuntu-26.04, ubuntu-24.04]
        SANITIZER: valgrind
        COMPILER: gcc
        TEST_MODE: valgrind
      - OS: [ubuntu-26.04, ubuntu-24.04]
        SANITIZER: ubsan
        COMPILER: [gcc, clang]
        ENABLE_UBSAN: "True"
        GTEST_DISCOVERY_TIMEOUT: 120
        TEST_MODE: default
        KUBERNETES_EPHEMERAL_STORAGE_REQUEST: "100G"
        KUBERNETES_EPHEMERAL_STORAGE_LIMIT: "100G"

sanitizers avx512:
  extends: .weekly sanitizers
  rules:
    - if: $CI_PIPELINE_SCHEDULE_DESCRIPTION =~ /Weekly/
      when: delayed
      start_in: 1 hour
  variables:
    MARCH: x86-64-v4
  tags:
    - ${OCUDU_RUNNER_TAG}-amd64
    - avx512
    - sctp
  parallel:
    matrix:
      # ubuntu-22.04 disabled due to https://github.com/google/sanitizers/issues/1259#issuecomment-642312392
      # TSAN Ubuntu 24.04 disabled - TSAN requires an ASLR config of 28 bits (instead of 32 bit as is by default on Ubuntu 24.04)
      - OS: [ubuntu-26.04]
        SANITIZER: tsan
        COMPILER: [gcc, clang]
        ENABLE_TSAN: "True"
        TEST_MODE: full
      - OS: [ubuntu-26.04, ubuntu-24.04]
        SANITIZER: asan
        COMPILER: clang
        ENABLE_ASAN: "True"
        TEST_MODE: full
      # Valgrind doesn't support AVX512 instruction set
      - OS: [ubuntu-26.04, ubuntu-24.04]
        SANITIZER: ubsan
        COMPILER: [gcc, clang]
        ENABLE_UBSAN: "True"
        GTEST_DISCOVERY_TIMEOUT: 120
        TEST_MODE: full
        KUBERNETES_EPHEMERAL_STORAGE_REQUEST: "100G"
        KUBERNETES_EPHEMERAL_STORAGE_LIMIT: "100G"

sanitizers arm neon:
  extends: .weekly sanitizers
  tags:
    - ${OCUDU_RUNNER_TAG}-arm64
  variables:
    MCPU: neoverse-n1+crc+crypto+ssbs
  parallel:
    matrix:
      # ubuntu-22.04 disabled due to https://github.com/google/sanitizers/issues/1259#issuecomment-642312392
      # TSAN Ubuntu 24.04 disabled - TSAN requires an ASLR config of 28 bits (instead of 32 bit as is by default on Ubuntu 24.04)
      - OS: [ubuntu-26.04]
        SANITIZER: tsan
        COMPILER: [gcc, clang]
        ENABLE_TSAN: "True"
        TEST_MODE: default
      - OS: [ubuntu-26.04, ubuntu-24.04]
        SANITIZER: asan
        COMPILER: clang
        ENABLE_ASAN: "True"
        TEST_MODE: default
      - OS: [ubuntu-26.04] # ubuntu-24.04 disabled
        SANITIZER: valgrind
        COMPILER: gcc
        TEST_MODE: valgrind
        KUBERNETES_EPHEMERAL_STORAGE_REQUEST: "100G"
        KUBERNETES_EPHEMERAL_STORAGE_LIMIT: "100G"
      - OS: [ubuntu-26.04, ubuntu-24.04]
        SANITIZER: ubsan
        COMPILER: [gcc, clang]
        ENABLE_UBSAN: "True"
        GTEST_DISCOVERY_TIMEOUT: 120
        TEST_MODE: default
        KUBERNETES_EPHEMERAL_STORAGE_REQUEST: "100G"
        KUBERNETES_EPHEMERAL_STORAGE_LIMIT: "100G"

# UHD Alternatives

build uhd alt:
  extends: .build_and_unit
  rules:
    - if: $CI_PIPELINE_SCHEDULE_DESCRIPTION =~ /Weekly/
  variables:
    TEST_MODE: none
