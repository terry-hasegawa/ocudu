# OCUDU component image build pipeline — Red Hat UBI9 variant.
#
# Builds the same component matrix as image-build.yml but on UBI9 base images
# for Red Hat container certification. Jobs run on RHEL-registered runners so
# that EPEL/CRB packages are available via the host subscription bind-mount.
#
# Stages:
#   build   — parallel matrix jobs, one per component × driver × arch/SIMD
#   certify — preflight check container (--submit when Pyxis credentials set)

stages:
  - build
  - certify

# ---------------------------------------------------------------------------
# Derive the SIMD label used in the image tag from the MARCH value.
# ---------------------------------------------------------------------------
.simd-label: &simd-label |
  case "${MARCH}" in
    x86-64-v3)                   SIMD=avx2 ;;
    x86-64-v4)                   SIMD=avx512 ;;
    neoverse-n1+crc+crypto+ssbs) SIMD=neon ;;
    *)                           SIMD="${MARCH}" ;;
  esac

# ---------------------------------------------------------------------------
# Base job — all RH build cells extend this
# ---------------------------------------------------------------------------
.image-build-rh:
  extends: .docker-builder
  stage: build
  tags:
    - ocudu-rhel-${TARGETARCH}
  image: ${OCUDU_REGISTRY_URI}/rh-tool-cli:$RH_TOOL_CLI_VERSION
  variables:
    REGISTRY_URI: ${CI_REGISTRY}/${CI_PROJECT_PATH}/images
    MODE: publish
    MULTI_ARCH_BUILD: "false"
    CACHE: "true"
    CACHE_MODE: "max"
    OS: registry.access.redhat.com/ubi9/ubi
    OS_VERSION: "9"
    COMPONENT: ""
    DRIVER: ""
    TARGETARCH: amd64
    MARCH: x86-64-v4
  before_script:
    - *simd-label
    - export CONTEXT=${CI_PROJECT_DIR}
    - export DOCKERFILE=${CI_PROJECT_DIR}/docker
    - |
      if [ -n "${DRIVER}" ]; then
        IMAGE_COMPONENT="${COMPONENT}-${DRIVER}"
      else
        IMAGE_COMPONENT="${COMPONENT}"
      fi
    - DATE=$(date +%Y%m%d)
    - export NAME="${IMAGE_COMPONENT}"
    - export VERSION="ubi9-${OS_VERSION}-${SIMD}-${DATE}"
    - export PLATFORM="${TARGETARCH}"
    - |
      case "${COMPONENT}" in
        cu|cu-cp|cu-up) DOCKER_TARGET=runtime-lean ;;
        *)              DOCKER_TARGET=runtime ;;
      esac
    - export DOCKER_TARGET
    - |
      ENABLE_UHD=Off
      ENABLE_DPDK=Off
      case "${DRIVER}" in
        uhd)  ENABLE_UHD=On ;;
        dpdk) ENABLE_DPDK=On ;;
      esac
    - |
      export BUILD_ARGS="\
      OS=${OS};\
      OS_VERSION=${OS_VERSION};\
      UHD_VERSION=${UHD_VERSION};\
      DPDK_VERSION=${DPDK_VERSION};\
      ROHC_VERSION=${ROHC_VERSION};\
      MARCH=${MARCH};\
      TARGETARCH=${TARGETARCH};\
      COMPONENT=${COMPONENT};\
      ENABLE_UHD=${ENABLE_UHD};\
      ENABLE_DPDK=${ENABLE_DPDK};\
      EXTRA_CMAKE_ARGS=${EXTRA_CMAKE_ARGS}"
    - |
      if [ -n "${PKG_VERSIONS}" ]; then
        BUILD_ARGS="${BUILD_ARGS};PKG_VERSIONS=${PKG_VERSIONS}"
      fi
    - |
      IMAGE_REF="${REGISTRY_URI}/${NAME}:${VERSION}"
      echo "IMAGE_REF=${IMAGE_REF}" > build.env
  artifacts:
    reports:
      dotenv: build.env

# ---------------------------------------------------------------------------
# Build jobs
# ---------------------------------------------------------------------------

build-rh:gnb:
  extends: .image-build-rh
  parallel:
    matrix:
      - COMPONENT: gnb
        DRIVER: uhd
        TARGETARCH: amd64
        MARCH: x86-64-v4
      - COMPONENT: gnb
        DRIVER: uhd
        TARGETARCH: amd64
        MARCH: x86-64-v3
      - COMPONENT: gnb
        DRIVER: dpdk
        TARGETARCH: amd64
        MARCH: x86-64-v4
      - COMPONENT: gnb
        DRIVER: dpdk
        TARGETARCH: amd64
        MARCH: x86-64-v3
      - COMPONENT: gnb
        DRIVER: uhd
        TARGETARCH: arm64
        MARCH: neoverse-n1+crc+crypto+ssbs
      - COMPONENT: gnb
        DRIVER: dpdk
        TARGETARCH: arm64
        MARCH: neoverse-n1+crc+crypto+ssbs
  rules:
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
    - if: $CI_PIPELINE_SCHEDULE_DESCRIPTION =~ /Nightly/

