        MARCH: x86-64-v3
      - COMPONENT: du
        DRIVER: dpdk
        TARGETARCH: amd64
        MARCH: x86-64-v4
      - COMPONENT: du
        DRIVER: dpdk
        TARGETARCH: amd64
        MARCH: x86-64-v3
      - COMPONENT: du
        DRIVER: uhd
