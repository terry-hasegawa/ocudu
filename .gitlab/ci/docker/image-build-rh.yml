# ---------------------------------------------------------------------------
# Certify jobs — preflight check container
#
# Images remain in the GitLab registry; preflight pulls from there using
# CI registry credentials passed via PFLT_DOCKERCONFIG.
#
# --submit is only added when PFLT_PYXIS_API_TOKEN is set. Each concrete
# job passes its own PFLT_CERTIFICATION_COMPONENT_ID from a per-component
# GitLab CI/CD variable (e.g. PFLT_CERTIFICATION_COMPONENT_ID_GNB).
# Set those variables in GitLab CI/CD settings once Partner Connect
# project IDs are available.
# ---------------------------------------------------------------------------

.preflight-gate:
  stage: certify
  tags:
    - ocudu-rhel-amd64
  image: ${OCUDU_REGISTRY_URI}/rh-tool-cli:$RH_TOOL_CLI_VERSION
  variables:
    PFLT_PYXIS_API_TOKEN: ""
    PFLT_CERTIFICATION_COMPONENT_ID: ""
  before_script:
    - |
      echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY \
        -u $CI_REGISTRY_USER --password-stdin
    - |
      export PFLT_DOCKERCONFIG=/root/.docker/config.json
  script:
    - |
      [ -z "$IMAGE_REF" ] && echo "IMAGE_REF not set — dotenv artifact missing?" && exit 1
    - |
      SUBMIT_FLAG=""
      [ -n "${PFLT_PYXIS_API_TOKEN}" ] && [ -n "${PFLT_CERTIFICATION_COMPONENT_ID}" ] && SUBMIT_FLAG="--submit"
      preflight check container ${IMAGE_REF} ${SUBMIT_FLAG}
  artifacts:
    paths:
      - preflight-results/
    expire_in: 7 days
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
    - if: $CI_PIPELINE_SCHEDULE_DESCRIPTION =~ /Nightly/

certify:gnb:
  extends: .preflight-gate
  variables:
    PFLT_CERTIFICATION_COMPONENT_ID: ${PFLT_CERTIFICATION_COMPONENT_ID_GNB}
  needs:
    - job: build-rh:gnb
      artifacts: true

certify:du:
  extends: .preflight-gate
  variables:
    PFLT_CERTIFICATION_COMPONENT_ID: ${PFLT_CERTIFICATION_COMPONENT_ID_DU}
  needs:
    - job: build-rh:du
      artifacts: true

certify:cu:
  extends: .preflight-gate
