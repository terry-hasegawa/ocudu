# OCUDU component image build pipeline.
#
# Trigger: scheduled pipeline with description matching /Nightly/, web UI run,
#          or manual job trigger.
# Stages:
#   build     — parallel matrix jobs, one per component × driver × OS × arch/SIMD
#   sign-sbom — grype CVE gate per published image (cosign sign + SPDX already
#               handled by .docker-builder when MODE=publish)
#
# To add a driver, OS, component, or SIMD variant: edit the matching
# .matrix-* template in .gitlab/ci/docker/image-matrix.yml.

stages:
  - build

# ---------------------------------------------------------------------------
# Derive the SIMD label used in the image tag from the MARCH value.
#
#   x86-64-v3                    → avx2
#   x86-64-v4                    → avx512
#   neoverse-n1+crc+crypto+ssbs  → neon
#   <anything else>              → value as-is
# ---------------------------------------------------------------------------
.simd-label: &simd-label |
  case "${MARCH}" in
    x86-64-v3)                   SIMD=avx2 ;;
    x86-64-v4)                   SIMD=avx512 ;;
    neoverse-n1+crc+crypto+ssbs) SIMD=neon ;;
    *)                           SIMD="${MARCH}" ;;
  esac

# ---------------------------------------------------------------------------
# Base job — all build cells extend this
# ---------------------------------------------------------------------------
.image-build:
  extends: .docker-builder
  stage: build
  variables:
    REGISTRY_URI: ${CI_REGISTRY}/${CI_PROJECT_PATH}/images
    MODE: publish
    MULTI_ARCH_BUILD: "false"
    CACHE: "true"
    CACHE_MODE: "max"
    # Component, driver, OS, arch, SIMD — set per matrix cell
    COMPONENT: ""
    DRIVER: ""
    OS: ubuntu
    OS_VERSION: "24.04"
    TARGETARCH: amd64
    MARCH: x86-64-v4
  before_script:
    - *simd-label
    - export CONTEXT=${CI_PROJECT_DIR}
    - export DOCKERFILE=${CI_PROJECT_DIR}/docker
    # Image name:  <component>  or  <component>-<driver>  when driver is set
    - |
      if [ -n "${DRIVER}" ]; then
        IMAGE_COMPONENT="${COMPONENT}-${DRIVER}"
      else
        IMAGE_COMPONENT="${COMPONENT}"
      fi
    # Tag: <os>-<os_version>-<simd>-<date>
    - DATE=$(date +%Y%m%d)
    - export NAME="${IMAGE_COMPONENT}"
    - |
      if [ -n "${PROMOTE_IMAGE_TAG:-}" ]; then
        VERSION="${PROMOTE_IMAGE_TAG}"
      else
        VERSION="${OS}-${OS_VERSION}-${SIMD}-${DATE}"
      fi
      export VERSION
    - export PLATFORM="${TARGETARCH}"
    - |
      case "${COMPONENT}" in
        cu|cu-cp|cu-up) DOCKER_TARGET=runtime-lean ;;
        *)
          case "${DRIVER}" in
            uhd)  DOCKER_TARGET=runtime-uhd ;;
            dpdk) DOCKER_TARGET=runtime-dpdk ;;
            *)    DOCKER_TARGET=runtime ;;
          esac ;;
      esac
    - export DOCKER_TARGET
    # Build args forwarded into the Dockerfile
    - |
      ENABLE_UHD=Off
      ENABLE_DPDK=Off
      case "${DRIVER}" in
        uhd)  ENABLE_UHD=On ;;
        dpdk) ENABLE_DPDK=On ;;
      esac
    - |
      CPU_JOBS="$(/usr/local/bin/get_available_cores.sh 2>/dev/null || ${CI_PROJECT_DIR}/.gitlab/ci/builders/get_available_cores.sh)"
      if [ -z "${CPU_JOBS}" ] || [ "${CPU_JOBS}" -lt 1 ]; then
        CPU_JOBS=1
      fi
      export CPU_JOBS
    - |
      export BUILD_ARGS="\
      OS=${OS};\
      OS_VERSION=${OS_VERSION};\
      UHD_VERSION=${UHD_VERSION};\
      DPDK_VERSION=${DPDK_VERSION};\
      ROHC_VERSION=${ROHC_VERSION};\
      OCUDU_IMAGE_VERSION=${VERSION};\
      OCUDU_IMAGE_RELEASE=${CI_COMMIT_SHORT_SHA};\
      MARCH=${MARCH};\
      NUM_JOBS=${CPU_JOBS};\
      TARGETARCH=${TARGETARCH};\
      COMPONENT=${COMPONENT};\
      ENABLE_UHD=${ENABLE_UHD};\
      ENABLE_DPDK=${ENABLE_DPDK};\
      EXTRA_CMAKE_ARGS=${EXTRA_CMAKE_ARGS}"
    # PKG_VERSIONS only passed when non-empty to keep args clean
    - |
      if [ -n "${PKG_VERSIONS}" ]; then
        BUILD_ARGS="${BUILD_ARGS};PKG_VERSIONS=${PKG_VERSIONS}"
      fi
    # Write the exact image ref to a dotenv artifact so the grype job
    # can consume it without recomputing the date.
    - |
      IMAGE_REF="${REGISTRY_URI}/${NAME}:${VERSION}"
      echo "IMAGE_REF=${IMAGE_REF}" > build.env
  artifacts:
    reports:
      dotenv: build.env

# ---------------------------------------------------------------------------
# Build jobs
# ---------------------------------------------------------------------------

build-and-publish:gnb:
  extends:
    - .image-build
    - .matrix-image-gnb
  rules:
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
    - if: $CI_PIPELINE_SCHEDULE_DESCRIPTION =~ /Nightly/

build-and-publish:du:
  extends:
    - .image-build
    - .matrix-image-du
