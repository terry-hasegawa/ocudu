    - job: build-and-publish:cu-cp
      artifacts: true

sign-sbom:cu-up:
  extends: .grype-gate
  needs:
    - job: build-and-publish:cu-up
      artifacts: true

sign-sbom:ru-emulator:
  extends: .grype-gate
  needs:
    - job: build-and-publish:ru-emulator
      artifacts: true
