# ---------------------------------------------------------------------------
# sign-sbom stage — grype CVE gate
#
# One concrete job per build:* job. Each needs: its corresponding build job
# and inherits IMAGE_REF from the dotenv artifact.
# cosign sign + SPDX attestation are already handled inside .docker-builder.
# This stage adds the grype CVE gate (fail on CRITICAL) and attaches the
# grype report as a second cosign attestation.
# ---------------------------------------------------------------------------

.grype-gate:
  stage: sign-sbom
  image: ${OCUDU_REGISTRY_URI}/buildkit-cli:$BUILDKIT_CLI_VERSION
  variables:
    COSIGN_YES: "true"
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - |
      [ -z "$IMAGE_REF" ] && echo "IMAGE_REF not set — dotenv artifact missing?" && exit 1
    - |
      echo "=== Running grype CVE scan on ${IMAGE_REF} ==="
      grype registry:${IMAGE_REF} --fail-on critical -o json > grype-report.json
    - |
      echo "=== Attesting grype report ==="
      IMAGE_DIGEST="${IMAGE_REF}@$(regctl image digest ${IMAGE_REF})"
      cosign attest --predicate grype-report.json --type vuln ${IMAGE_DIGEST}
  artifacts:
    paths:
      - grype-report.json
    expire_in: 7 days
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
    - if: $CI_PIPELINE_SCHEDULE_DESCRIPTION =~ /Nightly/

sign-sbom:gnb:
  extends: .grype-gate
  needs:
    - job: build-and-publish:gnb
      artifacts: true

sign-sbom:du:
  extends: .grype-gate
  needs:
    - job: build-and-publish:du
      artifacts: true

sign-sbom:cu:
  extends: .grype-gate
  needs:
    - job: build-and-publish:cu
      artifacts: true

sign-sbom:cu-cp:
  extends: .grype-gate
