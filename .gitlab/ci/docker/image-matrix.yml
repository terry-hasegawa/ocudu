# Default library versions — overridable per pipeline run via CI/CD variables.
# To add a driver, OS, component, or SIMD variant: edit the matching
# .matrix-* template in this file.

variables:
  UHD_VERSION: "4.6.0.0"
  DPDK_VERSION: "25.11.2"
  ROHC_VERSION: "2.3.1"
  PKG_VERSIONS: ""
  EXTRA_CMAKE_ARGS: "-DCMAKE_BUILD_TYPE=Release"
  RH_TOOL_CLI_VERSION: "1.0.3"

.matrix-legacy-image:
  parallel:
    matrix:
      - SUFFIX: avx2
        MARCH: x86-64-v3
        PLATFORM: amd64
      - SUFFIX: avx2_debug
        EXTRA_CMAKE_ARGS: -DFORCE_DEBUG_INFO=On
        MARCH: x86-64-v3
        PLATFORM: amd64
      - SUFFIX: avx512
        MARCH: x86-64-v4
        PLATFORM: amd64
      - SUFFIX: avx512_debug
        EXTRA_CMAKE_ARGS: -DFORCE_DEBUG_INFO=On
        MARCH: x86-64-v4
        PLATFORM: amd64
      - SUFFIX: arm64
        MARCH: neoverse-n1+crc+crypto+ssbs
        PLATFORM: arm64
      - SUFFIX: arm64_debug
        EXTRA_CMAKE_ARGS: -DFORCE_DEBUG_INFO=On
        MARCH: neoverse-n1+crc+crypto+ssbs
        PLATFORM: arm64

.matrix-image-gnb:
