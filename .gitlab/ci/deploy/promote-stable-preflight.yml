.preflight-rh:
  extends: .preflight-stable
  before_script:
    - *simd-label
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - export PFLT_DOCKERCONFIG=/root/.docker/config.json
    - |
      if [ -n "${DRIVER}" ]; then
        IMAGE_COMPONENT="${COMPONENT}-${DRIVER}"
        TAG_DRIVER="-${DRIVER}"
      else
        IMAGE_COMPONENT="${COMPONENT}"
        TAG_DRIVER=""
      fi
      if [ -n "${PROMOTE_IMAGE_TAG:-}" ]; then
        VERSION="${PROMOTE_IMAGE_TAG}-ubi9-9.6${TAG_DRIVER}-${SIMD}"
      else
        VERSION="ubi9-9.6${TAG_DRIVER}-${SIMD}-$(date +%Y%m%d)"
      fi
      export IMAGE_REF="${CI_REGISTRY}/${CI_PROJECT_PATH}/images/${IMAGE_COMPONENT}:${VERSION}"
    - |
      CERTIFICATION_COMPONENT_ID=""
      case "${IMAGE_COMPONENT}" in
        gnb-uhd|gnb-dpdk) CERTIFICATION_COMPONENT_ID="${PFLT_CERTIFICATION_COMPONENT_ID_GNB}" ;;
        du-uhd|du-dpdk)   CERTIFICATION_COMPONENT_ID="${PFLT_CERTIFICATION_COMPONENT_ID_DU}" ;;
        cu)               CERTIFICATION_COMPONENT_ID="${PFLT_CERTIFICATION_COMPONENT_ID_CU}" ;;
        cu-cp)            CERTIFICATION_COMPONENT_ID="${PFLT_CERTIFICATION_COMPONENT_ID_CU_CP}" ;;
        cu-up)            CERTIFICATION_COMPONENT_ID="${PFLT_CERTIFICATION_COMPONENT_ID_CU_UP}" ;;
        ru-emulator-dpdk) CERTIFICATION_COMPONENT_ID="${PFLT_CERTIFICATION_COMPONENT_ID_RU_EMULATOR}" ;;
      esac
      if [ "${PFLT_SUBMIT:-false}" = "true" ]; then
        export PFLT_CERTIFICATION_COMPONENT_ID="${CERTIFICATION_COMPONENT_ID}"
      else
        unset PFLT_CERTIFICATION_COMPONENT_ID
      fi

preflight:rh:gnb:
  extends:
    - .preflight-rh
    - .matrix-image-rh-gnb
  needs:
    - job: promote-stable:rh:gnb
      artifacts: false

preflight:rh:du:
