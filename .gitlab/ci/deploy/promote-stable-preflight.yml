.simd-label: &simd-label |
  case "${MARCH}" in
    x86-64-v3)                   SIMD=avx2 ;;
    x86-64-v4)                   SIMD=avx512 ;;
    neoverse-n1+crc+crypto+ssbs) SIMD=neon ;;
    *)                           SIMD="${MARCH}" ;;
  esac

.promote-stable:
  extends: .docker copy
  stage: promote-stable
  rules: &promote_rules
    - if: $ON_MR
      when: manual
      allow_failure: true
    - if: $ON_WEB
      when: manual
      allow_failure: true
    - if: $ON_API
      when: manual
      allow_failure: true
    - if: $ON_MAIN

.preflight-stable:
  stage: preflight
  image: ${OCUDU_REGISTRY_URI}/rh-tool-cli:$RH_TOOL_CLI_VERSION
  tags:
    - ocudu-rhel-amd64
  variables:
    GIT_STRATEGY: none
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - export PFLT_DOCKERCONFIG=/root/.docker/config.json
  script:
    - |
      [ -z "${IMAGE_REF}" ] && echo "IMAGE_REF is mandatory" && exit 1
      [ -z "${TARGETARCH}" ] && echo "TARGETARCH is mandatory" && exit 1
      mkdir -p preflight-results
      export PFLT_ARTIFACTS="${CI_PROJECT_DIR}/preflight-results"
      export PFLT_LOGFILE="${CI_PROJECT_DIR}/preflight-results/preflight.log"
      export PFLT_JUNIT=true
      set +e
      if [ "${PFLT_SUBMIT:-false}" = "true" ]; then
        [ -z "${PFLT_PYXIS_API_TOKEN}" ] && echo "PFLT_PYXIS_API_TOKEN is mandatory when PFLT_SUBMIT=true" && exit 1
        [ -z "${PFLT_CERTIFICATION_COMPONENT_ID}" ] && echo "PFLT_CERTIFICATION_COMPONENT_ID is mandatory when PFLT_SUBMIT=true" && exit 1
        preflight check container "${IMAGE_REF}-stable" --platform "${TARGETARCH}" --submit \
          > preflight-results/preflight-results.json \
          2> preflight-results/preflight-stderr.log
      else
        env -u PFLT_PYXIS_API_TOKEN -u PFLT_CERTIFICATION_COMPONENT_ID \
          preflight check container "${IMAGE_REF}-stable" --platform "${TARGETARCH}" \
          > preflight-results/preflight-results.json \
          2> preflight-results/preflight-stderr.log
      fi
      PREFLIGHT_STATUS=$?
      set -e
      cat preflight-results/preflight-stderr.log
      cat preflight-results/preflight-results.json
      if [ "${PREFLIGHT_STATUS}" -ne 0 ]; then
        echo "preflight command failed with exit code ${PREFLIGHT_STATUS}"
        exit "${PREFLIGHT_STATUS}"
      fi
      jq -e '.passed == true' preflight-results/preflight-results.json >/dev/null
  artifacts:
    paths:
      - preflight-results/
    expire_in: 7 days
    when: always
  rules: *promote_rules

.legacy-image-build:
  extends:
    - .docker-builder
    - .matrix-legacy-image
  stage: publish
  variables:
    REGISTRY_URI: ${OCUDU_REGISTRY_URI}
    CONTEXT: ${CI_PROJECT_DIR}
    DOCKERFILE: docker
    MODE: publish
    ATTESTATION_FILE: /usr/local/share/ocudu.spdx
    OS: ubuntu
    OS_VERSION: "24.04"
    DOCKER_UHD_VERSION: "4.9.0.0"
    DOCKER_DPDK_VERSION: "24.11.2"
    EXTRA_CMAKE_ARGS: "-DCMAKE_BUILD_TYPE=Release"
    KUBERNETES_EPHEMERAL_STORAGE_REQUEST: "100G"
    KUBERNETES_EPHEMERAL_STORAGE_LIMIT: "100G"
  tags:
    - ${OCUDU_RUNNER_TAG}-${PLATFORM}
  before_script:
    - |
      CPU_JOBS="$(/usr/local/bin/get_available_cores.sh 2>/dev/null || ${CI_PROJECT_DIR}/.gitlab/ci/builders/get_available_cores.sh)"
      if [ -z "${CPU_JOBS}" ] || [ "${CPU_JOBS}" -lt 1 ]; then
        CPU_JOBS=1
      fi
      export CPU_JOBS
      export NAME="ocudu_nightly_${SUFFIX}"
      if [ -n "${PROMOTE_IMAGE_TAG:-}" ]; then
        VERSION="${PROMOTE_IMAGE_TAG}"
      else
        VERSION="$(git show -s --date=format:%Y%m%d --format=%cd ${CI_COMMIT_SHA})_${CI_COMMIT_SHORT_SHA}"
      fi
      export VERSION
      export BUILD_ARGS="OS=${OS};OS_VERSION=${OS_VERSION};UHD_VERSION=${DOCKER_UHD_VERSION};DPDK_VERSION=${DOCKER_DPDK_VERSION};OCUDU_IMAGE_VERSION=${VERSION};OCUDU_IMAGE_RELEASE=${CI_COMMIT_SHORT_SHA};MARCH=${MARCH};NUM_JOBS=${CPU_JOBS};EXTRA_CMAKE_ARGS=\"${EXTRA_CMAKE_ARGS}\""
  rules: *promote_rules

build-stable-source:legacy:
  extends: .legacy-image-build

promote-stable:legacy:
  extends:
    - .promote-stable
    - .matrix-legacy-image
  variables:
    GIT_STRATEGY: fetch
  before_script:
    - |
      if [ -n "${PROMOTE_IMAGE_TAG:-}" ]; then
        VERSION="${PROMOTE_IMAGE_TAG}"
      else
        VERSION="$(git show -s --date=format:%Y%m%d --format=%cd ${CI_COMMIT_SHA})_${CI_COMMIT_SHORT_SHA}"
      fi
      IMAGE_REF="${OCUDU_REGISTRY_URI}/ocudu_nightly_${SUFFIX}:${VERSION}"
      export SOURCE_IMAGE="${IMAGE_REF}"
      export DESTINATION_IMAGE="${IMAGE_REF}-stable"
  needs:
    - job: build-stable-source:legacy
      artifacts: false

.promote-stable-ubuntu:
  extends: .promote-stable
  before_script:
    - *simd-label
    - |
      if [ -n "${DRIVER}" ]; then
        IMAGE_COMPONENT="${COMPONENT}-${DRIVER}"
      else
        IMAGE_COMPONENT="${COMPONENT}"
      fi
      if [ -n "${PROMOTE_IMAGE_TAG:-}" ]; then
        VERSION="${PROMOTE_IMAGE_TAG}-${OS}-${OS_VERSION}-${SIMD}"
      else
        VERSION="${OS}-${OS_VERSION}-${SIMD}-$(date +%Y%m%d)"
      fi
      IMAGE_REF="${CI_REGISTRY}/${CI_PROJECT_PATH}/images/${IMAGE_COMPONENT}:${VERSION}"
      export SOURCE_IMAGE="${IMAGE_REF}"
      export DESTINATION_IMAGE="${IMAGE_REF}-stable"

